<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>उपनयन संस्कार · Kulkarni</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Noto+Sans+Devanagari:wght@300;400;600;700&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #C8922A;
    --gold-light: #E8B84B;
    --gold-pale: #F5D98A;
    --maroon: #5C0A0A;
    --deep-maroon: #3D0505;
    --cream: #FDF6E3;
  }

  body {
    font-family: 'Noto Sans Devanagari', sans-serif;
    background: var(--deep-maroon);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ── OVERLAY ── */
  #overlay {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 30% 20%, #5C0A0A 0%, #2A0505 40%, #1A0303 100%);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  #overlay.hiding {
    opacity: 0;
    pointer-events: none;
    transform: scale(1.04);
  }

  /* ── MANDALA BG ── */
  .mandala-bg {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.07;
    pointer-events: none;
  }

  .mandala-bg svg {
    width: min(800px, 100vw);
    height: min(800px, 100vh);
    animation: mandalaRotate 60s linear infinite;
  }

  @keyframes mandalaRotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* ── PETALS / SPARKLE ── */
  .petal {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0;
    animation: petalFloat var(--dur, 6s) ease-in-out var(--delay, 0s) infinite;
  }

  @keyframes petalFloat {
    0% { transform: translateY(110vh) translateX(0) scale(0); opacity: 0; }
    10% { opacity: 0.8; transform: translateY(90vh) translateX(10px) scale(1); }
    90% { opacity: 0.3; }
    100% { transform: translateY(-10vh) translateX(-20px) scale(0.3); opacity: 0; }
  }

  /* ── CARD ── */
  .card {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 60px 48px;
    max-width: min(520px, 92vw);
    width: 100%;
    animation: cardReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
  }

  @keyframes cardReveal {
    from { opacity: 0; transform: translateY(40px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 24px;
    background: linear-gradient(160deg, rgba(92,10,10,0.6) 0%, rgba(30,3,3,0.8) 100%);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(200,146,42,0.25);
    box-shadow:
      0 40px 80px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(200,146,42,0.2),
      0 0 0 1px rgba(200,146,42,0.08);
    z-index: -1;
  }

  /* corner ornaments */
  .card-corner {
    position: absolute;
    width: 28px; height: 28px;
    border-color: rgba(200,146,42,0.5);
    border-style: solid;
  }
  .card-corner.tl { top: 14px; left: 14px; border-width: 2px 0 0 2px; }
  .card-corner.tr { top: 14px; right: 14px; border-width: 2px 2px 0 0; }
  .card-corner.bl { bottom: 14px; left: 14px; border-width: 0 0 2px 2px; }
  .card-corner.br { bottom: 14px; right: 14px; border-width: 0 2px 2px 0; }

  /* ── GANESH ── */
  .ganesh {
    font-size: clamp(3.5rem, 10vw, 5rem);
    display: block;
    margin-bottom: 4px;
    animation: ganeshFloat 4s ease-in-out infinite;
    filter: drop-shadow(0 0 24px rgba(200,146,42,0.7));
    animation-delay: 1.2s;
  }

  @keyframes ganeshFloat {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-10px); }
  }

  /* ── TOP BLESSING ── */
  .blessing {
    font-size: clamp(0.65rem, 1.4vw, 0.78rem);
    color: rgba(245,217,138,0.75);
    letter-spacing: 0.03em;
    line-height: 2;
    margin-bottom: 20px;
    animation: fadeSlide 1s ease 0.4s both;
  }

  /* ── TITLE ── */
  .title-en {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(0.6rem, 1.5vw, 0.75rem);
    color: var(--gold);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    margin-bottom: 6px;
    animation: fadeSlide 1s ease 0.55s both;
  }

  .title-mr {
    font-family: 'Noto Sans Devanagari', sans-serif;
    font-size: clamp(2rem, 6vw, 3.2rem);
    color: var(--gold-light);
    font-weight: 700;
    line-height: 1.1;
    text-shadow: 0 0 40px rgba(200,146,42,0.4);
    margin-bottom: 4px;
    animation: fadeSlide 1s ease 0.65s both;
  }

  .divider {
    color: var(--gold);
    font-size: 1.1rem;
    letter-spacing: 0.6em;
    margin: 14px 0;
    animation: fadeSlide 1s ease 0.75s both;
  }

  /* ── NAMES ── */
  .names-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    margin-bottom: 6px;
    animation: fadeSlide 1s ease 0.85s both;
  }

  .name-block { text-align: center; }

  .name-prefix {
    font-size: 0.75rem;
    color: var(--gold);
    font-weight: 600;
    letter-spacing: 0.06em;
    display: block;
  }

  .name-main {
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    color: #FF6B35;
    font-weight: 700;
    line-height: 1;
    text-shadow: 0 0 20px rgba(255,107,53,0.4);
  }

  .name-en {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.8rem;
    color: rgba(245,217,138,0.7);
    font-style: italic;
  }

  .names-amp {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.2rem;
    color: var(--gold);
    padding-top: 12px;
  }

  .family-line {
    font-size: 0.78rem;
    color: rgba(245,217,138,0.7);
    letter-spacing: 0.06em;
    margin-bottom: 8px;
    animation: fadeSlide 1s ease 0.92s both;
  }

  /* ── DATE CHIP ── */
  .date-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(200,146,42,0.12);
    border: 1px solid rgba(200,146,42,0.3);
    border-radius: 50px;
    padding: 7px 18px;
    font-size: 0.78rem;
    color: var(--gold-pale);
    margin-bottom: 32px;
    animation: fadeSlide 1s ease 1s both;
  }

  /* ── OPEN BUTTON ── */
  .open-btn {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 16px 48px;
    background: linear-gradient(135deg, #C8922A, #E8B84B, #C8922A);
    background-size: 200% 100%;
    border: none;
    border-radius: 50px;
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(0.65rem, 1.6vw, 0.78rem);
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--deep-maroon);
    cursor: pointer;
    box-shadow:
      0 8px 32px rgba(200,146,42,0.45),
      0 2px 8px rgba(0,0,0,0.3),
      inset 0 1px 0 rgba(255,255,255,0.3);
    transition: all 0.3s ease;
    animation: fadeSlide 1s ease 1.1s both, btnGlow 3s ease-in-out 2s infinite;
    overflow: hidden;
  }

  .open-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50px;
    background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
    transform: translateX(-100%);
    transition: transform 0.5s ease;
  }

  .open-btn:hover::after { transform: translateX(100%); }

  .open-btn:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow:
      0 16px 48px rgba(200,146,42,0.6),
      0 4px 16px rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(255,255,255,0.3);
    background-position: 100% 0;
  }

  .open-btn:active { transform: translateY(-1px) scale(0.99); }

  @keyframes btnGlow {
    0%, 100% { box-shadow: 0 8px 32px rgba(200,146,42,0.45), 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.3); }
    50% { box-shadow: 0 8px 40px rgba(200,146,42,0.75), 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.3); }
  }

  .btn-icon { font-size: 1.1rem; }

  /* ── DIVIDER LINE ── */
  .orn-line {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 20px auto 20px;
    max-width: 200px;
    opacity: 0.4;
    animation: fadeSlide 1s ease 1.15s both;
  }
  .orn-line::before, .orn-line::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--gold);
  }
  .orn-dot { color: var(--gold); font-size: 0.6rem; }

  /* ── HINT ── */
  .hint {
    font-size: 0.65rem;
    color: rgba(200,146,42,0.45);
    letter-spacing: 0.12em;
    margin-top: 14px;
    animation: fadeSlide 1s ease 1.25s both;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── RIPPLE on click ── */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(200,146,42,0.35);
    transform: scale(0);
    animation: rippleOut 0.7s ease forwards;
    pointer-events: none;
  }

  @keyframes rippleOut {
    to { transform: scale(4); opacity: 0; }
  }

  /* ── CURTAIN WIPE ── */
  #curtain {
    position: fixed;
    inset: 0;
    z-index: 10000;
    background: var(--deep-maroon);
    transform-origin: top;
    transform: scaleY(0);
    pointer-events: none;
  }

  #curtain.wipe {
    animation: curtainWipe 1.4s cubic-bezier(0.77, 0, 0.18, 1) forwards;
  }

  @keyframes curtainWipe {
    0%   { transform: scaleY(1); transform-origin: bottom; }
    45%  { transform: scaleY(1); transform-origin: bottom; }
    46%  { transform-origin: top; }
    100% { transform: scaleY(0); transform-origin: top; }
  }

  /* iframe fills behind */
  #invitation-frame {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    z-index: 1;
    opacity: 0;
    transition: opacity 0.5s ease 0.8s;
  }

  #invitation-frame.visible { opacity: 1; }
</style>
</head>
<body>

<!-- Invitation loads behind -->
<iframe id="invitation-frame" src="index.html"></iframe>

<!-- Curtain for transition -->
<div id="curtain"></div>

<!-- OVERLAY -->
<div id="overlay">

  <!-- Mandala background -->
  <div class="mandala-bg">
    <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <g id="petal-shape">
          <ellipse cx="0" cy="-80" rx="12" ry="30" fill="rgba(200,146,42,0.6)"/>
        </g>
      </defs>
      <!-- outer ring -->
      <g transform="translate(200,200)">
        <circle r="180" fill="none" stroke="rgba(200,146,42,0.3)" stroke-width="0.5"/>
        <circle r="140" fill="none" stroke="rgba(200,146,42,0.25)" stroke-width="0.5"/>
        <circle r="100" fill="none" stroke="rgba(200,146,42,0.2)" stroke-width="0.5"/>
        <circle r="60"  fill="none" stroke="rgba(200,146,42,0.3)" stroke-width="0.5"/>
        <!-- 16 petals outer -->
        <g id="outer-petals">
          <script>
            // rendered via transforms below
          </script>
          <use href="#petal-shape" transform="rotate(0)"/>
          <use href="#petal-shape" transform="rotate(22.5)"/>
          <use href="#petal-shape" transform="rotate(45)"/>
          <use href="#petal-shape" transform="rotate(67.5)"/>
          <use href="#petal-shape" transform="rotate(90)"/>
          <use href="#petal-shape" transform="rotate(112.5)"/>
          <use href="#petal-shape" transform="rotate(135)"/>
          <use href="#petal-shape" transform="rotate(157.5)"/>
          <use href="#petal-shape" transform="rotate(180)"/>
          <use href="#petal-shape" transform="rotate(202.5)"/>
          <use href="#petal-shape" transform="rotate(225)"/>
          <use href="#petal-shape" transform="rotate(247.5)"/>
          <use href="#petal-shape" transform="rotate(270)"/>
          <use href="#petal-shape" transform="rotate(292.5)"/>
          <use href="#petal-shape" transform="rotate(315)"/>
          <use href="#petal-shape" transform="rotate(337.5)"/>
        </g>
        <!-- spokes -->
        <line x1="0" y1="-180" x2="0" y2="180" stroke="rgba(200,146,42,0.15)" stroke-width="0.5"/>
        <line x1="-180" y1="0" x2="180" y2="0" stroke="rgba(200,146,42,0.15)" stroke-width="0.5"/>
        <line x1="-127" y1="-127" x2="127" y2="127" stroke="rgba(200,146,42,0.12)" stroke-width="0.5"/>
        <line x1="127" y1="-127" x2="-127" y2="127" stroke="rgba(200,146,42,0.12)" stroke-width="0.5"/>
        <!-- inner star -->
        <polygon points="0,-50 12,-18 45,-18 20,7 29,40 0,22 -29,40 -20,7 -45,-18 -12,-18" fill="none" stroke="rgba(200,146,42,0.4)" stroke-width="0.7"/>
        <circle r="18" fill="rgba(200,146,42,0.15)" stroke="rgba(200,146,42,0.5)" stroke-width="0.8"/>
        <text x="0" y="6" text-anchor="middle" font-size="16" fill="rgba(200,146,42,0.7)">ॐ</text>
      </g>
    </svg>
  </div>

  <!-- Floating petals -->
  <div class="petal" style="left:8%;  --dur:7s;  --delay:0s;   width:4px; height:4px;"></div>
  <div class="petal" style="left:18%; --dur:9s;  --delay:1.5s; width:5px; height:5px;"></div>
  <div class="petal" style="left:30%; --dur:6.5s;--delay:0.7s;"></div>
  <div class="petal" style="left:45%; --dur:8s;  --delay:2.2s; width:3px; height:3px;"></div>
  <div class="petal" style="left:58%; --dur:7.5s;--delay:0.3s;"></div>
  <div class="petal" style="left:70%; --dur:9.5s;--delay:1.1s; width:4px; height:4px;"></div>
  <div class="petal" style="left:82%; --dur:6s;  --delay:1.8s;"></div>
  <div class="petal" style="left:92%; --dur:8.5s;--delay:0.5s; width:3px; height:3px;"></div>

  <!-- Main card -->
  <div class="card">
    <div class="card-corner tl"></div>
    <div class="card-corner tr"></div>
    <div class="card-corner bl"></div>
    <div class="card-corner br"></div>

    <span class="ganesh">🐘</span>

    <div class="blessing">
      ॥ श्री गजानन प्रसन्न ॥ श्री मल्हारी म्हाळसाकांत प्रसन्न ॥<br>
      ॥ श्री जगदंबा प्रसन्न ॥ श्री व्यंकटेश प्रसन्न ॥
    </div>

    <p class="title-en">An Auspicious Invitation</p>
    <h1 class="title-mr">उपनयन संस्कार</h1>

    <div class="divider">✦ ॐ ✦</div>

    <div class="names-row">
      <div class="name-block">
        <span class="name-prefix">चि.</span>
        <div class="name-main">वरद</div>
        <div class="name-en">Chi. Varad</div>
      </div>
      <div class="names-amp">&amp;</div>
      <div class="name-block">
        <span class="name-prefix">चि.</span>
        <div class="name-main">भार्गव</div>
        <div class="name-en">Chi. Bhargav</div>
      </div>
    </div>

    <p class="family-line">कुलकर्णी (चिंचोळीकर) परिवार</p>

    <div class="date-chip">
      📅&nbsp; मंगळवार, दि. १६ जून २०२६ &nbsp;·&nbsp; 11:28 AM
    </div>

    <button class="open-btn" id="openBtn" onclick="openInvitation(event)">
      <span class="btn-icon">🪔</span>
      पत्रिका उघडा · Open Invitation
    </button>

    <div class="orn-line"><span class="orn-dot">✦</span></div>

    <p class="hint">CLICK TO OPEN WITH MUSIC</p>
  </div>
</div>

<script>
  function openInvitation(e) {
    // ripple
    var btn = document.getElementById('openBtn');
    var r = document.createElement('span');
    r.className = 'ripple';
    var rect = btn.getBoundingClientRect();
    var size = Math.max(rect.width, rect.height);
    r.style.width = r.style.height = size + 'px';
    r.style.left = (e.clientX - rect.left - size/2) + 'px';
    r.style.top  = (e.clientY - rect.top  - size/2) + 'px';
    btn.appendChild(r);
    setTimeout(function() { r.remove(); }, 700);

    // start music in iframe
    var frame = document.getElementById('invitation-frame');
    try {
      var iframeAudio = frame.contentWindow.document.getElementById('bg-audio');
      if (iframeAudio) {
        iframeAudio.volume = 1.0;
        iframeAudio.play().catch(function(){});
        // update button state inside iframe
        var iframeBtn = frame.contentWindow.document.getElementById('music-btn');
        var iframeBars = frame.contentWindow.document.getElementById('music-bars');
        if (iframeBtn) iframeBtn.textContent = '⏸';
        if (iframeBars) iframeBars.style.display = 'flex';
        frame.contentWindow.musicPlaying = true;
        frame.contentWindow.autoStarted = true;
      }
    } catch(err) {
      // cross-origin fallback: just show the iframe
    }

    // curtain wipe transition
    var curtain = document.getElementById('curtain');
    curtain.classList.add('wipe');

    // hide overlay after curtain starts
    setTimeout(function() {
      document.getElementById('overlay').classList.add('hiding');
      frame.classList.add('visible');
    }, 600);

    // remove overlay fully
    setTimeout(function() {
      document.getElementById('overlay').style.display = 'none';
    }, 1500);
  }
</script>
</body>
</html>
